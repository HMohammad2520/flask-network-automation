<!-- FLOATING SIDEBAR TOGGLE BUTTON -->
<button
  class="sidebar-toggle-btn"
  id="openSidebarBtn"
  aria-label="Open sidebar"
>
  ≡
</button>

<!-- SIDEBAR OVERLAY AND DRAWER -->
<div class="sidebar-overlay" id="sidebarOverlay">
  <div class="sidebar-drawer" id="sidebarDrawer">
    <div class="sidebar-drawer-header">
      <h3>✨ Navigation Hub</h3>
      <button
        class="close-sidebar-btn"
        id="closeSidebarBtn"
        aria-label="Close sidebar"
      >
        ×
      </button>
    </div>
    <div class="sidebar-drawer-content">
      <div class="sidebar-drawer-card">
        <h3>Weekly digest</h3>
        <div>
          <p>Get fresh news from Devixa Tech on new tools and modules.</p>
          <div class="newsletter">
            <input
              type="email"
              placeholder="your@email.com"
              id="newsEmailDrawer"
            />
            <button id="subscribeDrawerBtn">Subscribe →</button>
            <small>no spam, just news.</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
